name: Apply interface standardization to app files

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/restore_original_apps.yml"
      - "scripts/apply_interface_standardization.py"
      - "toolkit/interface_guidance.py"

permissions:
  contents: write

jobs:
  standardize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch individual Streamlit app files
        run: python scripts/apply_interface_standardization.py

      - name: Commit standardized app files
        run: |
          git config user.name "github-actions-bot"
          git config user.email "github-actions-bot@users.noreply.github.com"
          git add Home.py pages scripts/apply_interface_standardization.py toolkit/interface_guidance.py sitecustomize.py
          if git diff --cached --quiet; then
            echo "No interface standardization changes to commit."
          else
            git commit -m "Apply interface standardization to individual app files"
            git push
          fi
